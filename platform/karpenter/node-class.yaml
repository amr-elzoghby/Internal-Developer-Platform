apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2
  role: idp-prod-eks-nodes-role
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: idp-prod
  securityGroupSelectorTerms:
    - tags:
        aws:eks:cluster-name: idp-prod
  amiSelectorTerms:
    - alias: al2@latest
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
