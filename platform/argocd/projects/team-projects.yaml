---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-infra
  namespace: argocd
spec:
  description: "ArgoCD Project for Platform Infrastructure & Crossplane Claims"
  destinations:
    - namespace: default
      server: https://kubernetes.default.svc
    - namespace: crossplane-system
      server: https://kubernetes.default.svc
    - namespace: '*'
      server: https://kubernetes.default.svc
  sourceRepos:
    - '*'
