apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: team-alpha
  namespace: argocd
spec:
  description: "ArgoCD Project for Team Alpha"
  destinations:
    - namespace: team-alpha
      server: https://kubernetes.default.svc
    - namespace: team-alpha-*
      server: https://kubernetes.default.svc
  sourceRepos:
    - '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  clusterResourceWhitelist: []

