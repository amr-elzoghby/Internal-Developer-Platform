apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: team-gamma-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: 'https://github.com/amr-elzoghby/Internal-Developer-Platform.git'
        revision: HEAD
        directories:
          - path: apps/team-gamma/*
  template:
    metadata:
      name: 'team-gamma-{{path.basename}}'
    spec:
      project: team-gamma
      source:
        repoURL: 'https://github.com/amr-elzoghby/Internal-Developer-Platform.git'
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: team-gamma
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
