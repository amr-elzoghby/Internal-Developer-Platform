apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: team-beta-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: 'https://github.com/amr-elzoghby/Internal-Developer-Platform.git'
        revision: HEAD
        directories:
          - path: apps/team-beta/*
  template:
    metadata:
      name: 'team-beta-{{path.basename}}'
    spec:
      project: team-beta
      source:
        repoURL: 'https://github.com/amr-elzoghby/Internal-Developer-Platform.git'
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: team-beta
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
