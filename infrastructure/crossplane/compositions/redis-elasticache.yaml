apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xredisinstances.idp.io
spec:
  group: idp.io
  names:
    kind: XRedisInstance
    plural: xredisinstances
  claimNames:
    kind: RedisInstance
    plural: redisinstances
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                size:
                  type: string
                  default: small
              required:
                - size

---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xredisinstances.idp.io
spec:
  compositeTypeRef:
    apiVersion: idp.io/v1alpha1
    kind: XRedisInstance
  mode: Pipeline
  pipeline:
    - step: python-script
      functionRef:
        name: function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          def compose(req, rsp):
              composite = req.observed.composite.resource
              spec = composite["spec"] if "spec" in composite else {}
              size = spec["size"] if "size" in spec else "small"
              
              node_type = "cache.t3.micro"
              if size == "medium":
                  node_type = "cache.t3.small"
              elif size == "large":
                  node_type = "cache.t3.medium"

              # 1. Security Group for Redis
              sg = {
                  "apiVersion": "ec2.aws.upbound.io/v1beta1",
                  "kind": "SecurityGroup",
                  "spec": {
                      "deletionPolicy": "Orphan",
                      "forProvider": {
                          "region": "us-east-1",
                          "description": "Redis Security Group",
                          "vpcId": "${VPC_ID}"
                      }
                  }
              }

              # 1b. Security Group Rule for Redis
              sg_rule = {
                  "apiVersion": "ec2.aws.upbound.io/v1beta1",
                  "kind": "SecurityGroupRule",
                  "spec": {
                      "deletionPolicy": "Orphan",
                      "forProvider": {
                          "region": "us-east-1",
                          "securityGroupIdSelector": {
                              "matchControllerRef": True
                          },
                          "type": "ingress",
                          "fromPort": 6379,
                          "toPort": 6379,
                          "protocol": "tcp",
                          "cidrBlocks": ["10.0.0.0/16"]
                      }
                  }
              }

              # 2. ElastiCache Subnet Group
              subnet_group = {
                  "apiVersion": "elasticache.aws.upbound.io/v1beta1",
                  "kind": "SubnetGroup",
                  "spec": {
                      "deletionPolicy": "Orphan",
                      "forProvider": {
                          "region": "us-east-1",
                          "description": "Redis Subnet Group",
                          "subnetIds": ["${PRIVATE_SUBNET_1}", "${PRIVATE_SUBNET_2}"]
                      }
                  }
              }

              # 3. Redis Replication Group
              claim_ns = composite["spec"]["claimRef"]["namespace"] if "spec" in composite and "claimRef" in composite["spec"] and "namespace" in composite["spec"]["claimRef"] else "default"
              redis_name = composite["metadata"]["name"] if "metadata" in composite and "name" in composite["metadata"] else "redis-db"

              redis = {
                  "apiVersion": "elasticache.aws.upbound.io/v1beta1",
                  "kind": "ReplicationGroup",
                  "spec": {
                      "deletionPolicy": "Orphan",
                      "forProvider": {
                          "region": "us-east-1",
                          "replicationGroupDescription": "ElastiCache Redis cluster",
                          "engine": "redis",
                          "engineVersion": "7.0",
                          "nodeType": node_type,
                          "numCacheClusters": 1,
                          "cacheSubnetGroupNameSelector": {
                              "matchControllerRef": True
                          },
                          "securityGroupIdSelector": {
                              "matchControllerRef": True
                          }
                      },
                      "writeConnectionSecretToRef": {
                          "name": f"{redis_name}-conn",
                          "namespace": claim_ns
                      }
                  }
              }

              rsp.desired.resources["security-group"].resource.update(sg)
              rsp.desired.resources["security-group-rule"].resource.update(sg_rule)
              rsp.desired.resources["subnet-group"].resource.update(subnet_group)
              rsp.desired.resources["redis-instance"].resource.update(redis)
