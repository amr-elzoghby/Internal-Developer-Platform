apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xpostgressqlinstances.idp.io
spec:
  group: idp.io
  names:
    kind: XPostgresSQLInstance
    plural: xpostgressqlinstances
  claimNames:
    kind: PostgresSQLInstance
    plural: postgressqlinstances
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                storageGB:
                  type: integer
                  default: 20
                size:
                  type: string
                  default: small
              required:
                - storageGB
                - size

---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xpostgressqlinstances.idp.io
spec:
  compositeTypeRef:
    apiVersion: idp.io/v1alpha1
    kind: XPostgresSQLInstance
  mode: Pipeline
  pipeline:
    - step: python-script
      functionRef:
        name: function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          def compose(req, rsp):
              composite = req.observed.composite.resource
              spec = composite["spec"] if "spec" in composite else {}
              storage = spec["storageGB"] if "storageGB" in spec else 20
              size = spec["size"] if "size" in spec else "small"
              
              # Map user size to AWS Instance Class
              instance_class = "db.t3.micro"
              if size == "medium":
                  instance_class = "db.t3.small"
              elif size == "large":
                  instance_class = "db.t3.medium"

              # 1. Security Group for RDS
              sg = {
                  "apiVersion": "ec2.aws.upbound.io/v1beta1",
                  "kind": "SecurityGroup",
                  "spec": {
                      "deletionPolicy": "Orphan",
                      "forProvider": {
                          "region": "us-east-1",
                          "description": "RDS Instance Security Group",
                          "vpcIdSelector": {
                              "matchLabels": {
                                  "ManagedBy": "Terraform"
                              }
                          }
                      }
                  }
              }

              # 1b. Security Group Rule for RDS
              sg_rule = {
                  "apiVersion": "ec2.aws.upbound.io/v1beta1",
                  "kind": "SecurityGroupRule",
                  "spec": {
                      "deletionPolicy": "Orphan",
                      "forProvider": {
                          "region": "us-east-1",
                          "securityGroupIdSelector": {
                              "matchControllerRef": True
                          },
                          "type": "ingress",
                          "fromPort": 5432,
                          "toPort": 5432,
                          "protocol": "tcp",
                          "cidrBlocks": ["10.0.0.0/16"]
                      }
                  }
              }

              # 2. DB Subnet Group
              subnet_group = {
                  "apiVersion": "rds.aws.upbound.io/v1beta1",
                  "kind": "SubnetGroup",
                  "spec": {
                      "deletionPolicy": "Orphan",
                      "forProvider": {
                          "region": "us-east-1",
                          "description": "DB Subnet Group for RDS",
                          "subnetIdSelector": {
                              "matchLabels": {
                                  "kubernetes.io/role/internal-elb": "1"
                              }
                          }
                      }
                  }
              }

              # 3. RDS Instance
              claim_ns = composite["spec"]["claimRef"]["namespace"] if "spec" in composite and "claimRef" in composite["spec"] and "namespace" in composite["spec"]["claimRef"] else "default"
              db_name = composite["metadata"]["name"] if "metadata" in composite and "name" in composite["metadata"] else "rds-db"

              rds = {
                  "apiVersion": "rds.aws.upbound.io/v1beta1",
                  "kind": "Instance",
                  "spec": {
                      "deletionPolicy": "Orphan",
                      "forProvider": {
                          "region": "us-east-1",
                          "allocatedStorage": storage,
                          "dbSubnetGroupNameSelector": {
                              "matchControllerRef": True
                          },
                          "vpcSecurityGroupIdSelector": {
                              "matchControllerRef": True
                          },
                          "engine": "postgres",
                          "engineVersion": "15.4",
                          "instanceClass": instance_class,
                          "publiclyAccessible": False,
                          "skipFinalSnapshot": True,
                          "username": "postgres",
                          "passwordSecretRef": {
                              "name": f"{db_name}-password",
                              "namespace": claim_ns,
                              "key": "password"
                          }
                      },
                      "writeConnectionSecretToRef": {
                          "name": f"{db_name}-conn",
                          "namespace": claim_ns
                      }
                  }
              }

              rsp.desired.resources["security-group"].resource.update(sg)
              rsp.desired.resources["security-group-rule"].resource.update(sg_rule)
              rsp.desired.resources["subnet-group"].resource.update(subnet_group)
              rsp.desired.resources["rds-instance"].resource.update(rds)
